<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新日志 | 城市轨道交通系统</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #2c3e50;
            --accent-color: #1a3a5a; /* 轨道交通常用的深蓝色 */
            --sub-accent: #3498db;
            --line-color: #d1d8e0;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans SC', sans-serif;
            line-height: 1.8;
        }

        /* 顶部导航 */
        nav {
            padding: 1.2rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--line-color);
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-family: 'Noto Serif SC', serif;
            text-decoration: none;
            color: var(--text-color);
            letter-spacing: 0.15em;
            font-weight: 700;
            font-size: 1.4rem;
        }

        /* 页面标题区 */
        .header {
            padding: 5rem 10% 2rem;
            display: flex;
            align-items: flex-end;
            gap: 2rem;
        }

        .header h1 {
            writing-mode: vertical-rl;
            font-family: 'Noto Serif SC', serif;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 0.1em;
            color: var(--accent-color);
        }

        .header-en {
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: #aaa;
            transform: rotate(90deg);
            transform-origin: left bottom;
            white-space: nowrap;
            text-transform: uppercase;
        }

        /* 更新日志容器 */
        .changelog-container {
            padding: 2rem 10% 8rem;
            max-width: 900px;
        }

        .log-item {
            position: relative;
            padding-left: 3rem;
            margin-bottom: 6rem;
            border-left: 2px solid var(--line-color);
        }

        /* 轨道节点效果 */
        .log-item::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 0.5rem;
            width: 16px;
            height: 16px;
            background: #fff;
            border: 4px solid var(--accent-color);
            border-radius: 50%;
            z-index: 2;
        }

        .log-date {
            font-size: 1rem;
            color: var(--sub-accent);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
            font-family: monospace;
        }

        .log-version {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            margin: 0 0 1.5rem 0;
            color: var(--accent-color);
        }

        .log-content {
            background: #fff;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border-radius: 4px;
        }

        /* 图片样式 */
        .log-image {
            width: 100%;
            border-radius: 4px;
            margin: 1.5rem 0;
            cursor: zoom-in;
            transition: opacity 0.3s;
        }
        .log-image:hover { opacity: 0.9; }

        .log-content h4 {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            border-left: 4px solid var(--accent-color);
            padding-left: 1rem;
            margin-bottom: 1rem;
            color: var(--accent-color);
        }

        .log-content h4:first-child { margin-top: 0; }

        .log-content ul {
            list-style: none;
            padding: 0;
            margin: 0;
            color: #444;
        }

        .log-content li {
            margin-bottom: 0.6rem;
            padding-left: 1.2rem;
            position: relative;
        }

        .log-content li::before {
            content: "∟";
            position: absolute;
            left: 0;
            color: var(--sub-accent);
            font-weight: bold;
        }

        footer {
            padding: 4rem 10%;
            background: #eee;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.5rem; }
            .header { padding: 3rem 5% 1rem; }
            .changelog-container { padding: 2rem 5% 5rem; }
            .log-content { padding: 1.5rem; }
        }
    </style>
</head>


<body>

    <nav>
        <a href="index.html" class="nav-brand">梦想家园軌道交通</a>
        <div style="font-size: 1rem; color: #888;">JR EAST</div>

</section>

            <p style="font-size: 0.9rem;">纵横交错的钢轨，是梦想延伸的方向。<br>无论深夜或清晨，我们准时守候您的归途。</p>

</body>
